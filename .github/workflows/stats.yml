name: Generate GitHub Stats SVGs

# Runs every day at 6:00 AM UTC, and on every push to main
on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
  workflow_dispatch: # Lets you trigger it manually from the Actions tab

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    # Required so the workflow can write files back to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Check out the profile repo ─────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Create the assets folder if it doesn't exist ───────
      - name: Create assets directory
        run: mkdir -p assets

      # ── 3. Generate GitHub Stats card ─────────────────────────
      - name: Generate Stats Card
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: nilotpaldhar2004
          # Saves the SVG to assets/stats.svg
          output_path: assets/stats.svg
          # Card settings — match your README theme
          theme: tokyonight
          hide_border: true
          show_icons: true
          rank_icon: github
          count_private: false
          custom_title: "Nilotpal's GitHub Stats"
        env:
          # GITHUB_TOKEN is automatically provided — no setup needed
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Generate Top Languages card ────────────────────────
      - name: Generate Top Languages Card
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: nilotpaldhar2004
          output_path: assets/langs.svg
          card_type: top_langs
          theme: tokyonight
          hide_border: true
          layout: compact
          langs_count: 8
          count_private: false
          custom_title: "Most Used Languages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Generate Streak Stats ───────────────────────────────
      - name: Generate Streak Stats
        # Uses the official DenverCoder1 streak-stats action
        uses: DenverCoder1/github-readme-streak-stats@v2
        with:
          username: nilotpaldhar2004
          output_path: assets/streak.svg
          theme: tokyonight
          hide_border: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Generate Trophies ───────────────────────────────────
      - name: Generate Trophies
        uses: ryo-ma/github-profile-trophy@v1
        with:
          username: nilotpaldhar2004
          output_path: assets/trophies.svg
          theme: tokyonight
          no-frame: true
          no-bg: true
          margin-w: 6
          column: 6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Commit the generated SVGs back to the repo ─────────
      - name: Commit updated SVGs
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          # Only commit if there are actual changes (avoids empty commits)
          git diff --staged --quiet || git commit -m "chore: update github stats SVGs [skip ci]"
          git push
