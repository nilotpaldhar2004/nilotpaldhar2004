name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 3 * * *"   # Runs every day at 3:00 AM UTC
  push:
    branches: [main]
  workflow_dispatch:       # Lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required to commit the SVG files back to the repo

    steps:

      # ── Step 1: Check out the repo ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5

      # ── Step 2: Create assets folder if it doesn't exist ───────
      - name: Create assets folder
        run: mkdir -p assets

      # ── Step 3: Generate GitHub Stats card ─────────────────────
      # show_total_stars=true  → shows stars others gave YOUR repos
      # include_all_commits=true → counts commits across ALL years not just this year
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=nilotpaldhar2004&show_icons=true&theme=tokyonight&hide_border=true&rank_icon=github&include_all_commits=true&show_total_stars=true"
          path: assets/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 4: Generate Top Languages card ────────────────────
      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=nilotpaldhar2004&theme=tokyonight&hide_border=true&layout=compact&langs_count=8"
          path: assets/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 5: Generate Streak Stats via curl ─────────────────
      - name: Generate Streak Stats
        run: |
          curl -s \
            -H "User-Agent: Mozilla/5.0 (compatible; GitHubActions)" \
            "https://streak-stats.demolab.com/?user=nilotpaldhar2004&theme=tokyonight&hide_border=true" \
            -o assets/streak.svg

          if grep -q "<svg" assets/streak.svg; then
            echo "✅ Streak SVG saved."
          else
            echo "⚠️ Streak service error — removing bad file."
            rm -f assets/streak.svg
          fi

      # ── Step 6: Generate Trophies ───────────────────────────────
      # Uses github-trophies.vercel.app — a maintained fork that is
      # more reliable than github-profile-trophy.vercel.app.
      # Tries 3 different working URLs in order — uses first that works.
      - name: Generate Trophies
        run: |
          TROPHY_URLS=(
            "https://github-trophies.vercel.app/?username=nilotpaldhar2004&theme=tokyonight&no-frame=true&no-bg=true&margin-w=6&column=6"
            "https://github-profile-trophy.vercel.app/?username=nilotpaldhar2004&theme=tokyonight&no-frame=true&no-bg=true&margin-w=6&column=6"
            "https://github-profile-trophy-liard-delta.vercel.app/?username=nilotpaldhar2004&theme=tokyonight&no-frame=true&no-bg=true&margin-w=6&column=6"
          )

          for URL in "${TROPHY_URLS[@]}"; do
            echo "Trying: $URL"
            curl -s --max-time 15 \
              -H "User-Agent: Mozilla/5.0 (compatible; GitHubActions)" \
              "$URL" -o assets/trophies.svg

            if grep -q "<svg" assets/trophies.svg; then
              echo "✅ Trophies SVG saved from: $URL"
              break
            else
              echo "⚠️ Failed — trying next URL..."
              rm -f assets/trophies.svg
            fi
          done

          if [ ! -f assets/trophies.svg ]; then
            echo "❌ All trophy URLs failed. Trophies not updated."
          fi

      # ── Step 7: Commit all generated SVGs back to the repo ─────
      - name: Commit SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: update stats SVGs [skip ci]"
          git push
