name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 3 * * *"   # Runs every day at 3:00 AM UTC
  push:
    branches: [main]
  workflow_dispatch:       # Lets you run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required to commit the SVG files back to the repo

    steps:

      # ── Step 1: Check out the repo ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5

      # ── Step 2: Create assets folder if it doesn't exist ───────
      - name: Create assets folder
        run: mkdir -p assets

      # ── Step 3: Generate GitHub Stats card ─────────────────────
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=nilotpaldhar2004&show_icons=true&theme=tokyonight&hide_border=true&rank_icon=github&count_private=false"
          path: assets/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 4: Generate Top Languages card ────────────────────
      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=nilotpaldhar2004&theme=tokyonight&hide_border=true&layout=compact&langs_count=8&count_private=false"
          path: assets/langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 5: Generate Streak Stats via curl ─────────────────
      # streak-stats.demolab.com is a public SVG endpoint —
      # downloading it once per day as a static file is reliable.
      - name: Generate Streak Stats
        run: |
          curl -s "https://streak-stats.demolab.com/?user=nilotpaldhar2004&theme=tokyonight&hide_border=true" \
            -o assets/streak.svg
          echo "Streak SVG saved."

      # ── Step 6: Generate Trophies via curl ─────────────────────
      # Adds a browser User-Agent header so the trophy service
      # doesn't reject the request as a bot, and retries up to 3 times.
      - name: Generate Trophies
        run: |
          curl -s --retry 3 --retry-delay 5 \
            -H "User-Agent: Mozilla/5.0 (compatible; GitHubActions)" \
            "https://github-profile-trophy.vercel.app/?username=nilotpaldhar2004&theme=tokyonight&no-frame=true&no-bg=true&margin-w=6&column=6" \
            -o assets/trophies.svg

          # Check if the file is a valid SVG (not an error HTML page)
          if grep -q "<svg" assets/trophies.svg; then
            echo "✅ Trophies SVG saved successfully."
          else
            echo "⚠️ Trophy service returned an error — keeping previous version if it exists."
            # Don't overwrite with a broken file; delete the bad response
            rm assets/trophies.svg
          fi

      # ── Step 7: Commit all generated SVGs back to the repo ─────
      - name: Commit SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          # Only commits if something actually changed — no empty commits
          git diff --staged --quiet || git commit -m "chore: update stats SVGs [skip ci]"
          git push
